name: Deploy HCDViz to GitHub Pages

on:
  push:
    branches:
      - main
      - network_enhance
  workflow_dispatch:
    inputs:
      hcdformat-ref:
        description: hcdformat ref to build against (defaults to this HCDViz ref)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NO_COLOR: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: hcdviz-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out HCDViz
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Check out the matching hcdformat ref
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/hcdformat
          ref: ${{ inputs.hcdformat-ref || github.ref_name }}
          path: dependencies/hcdformat
          persist-credentials: false

      - name: Use the checked-out hcdformat crate
        run: |
          mkdir -p .cargo
          printf '%s\n' \
            '[patch.crates-io]' \
            'hcdformat = { path = "dependencies/hcdformat/rust/hcdformat-rs" }' \
            '' \
            '[target.wasm32-unknown-unknown]' \
            'rustflags = ['\''--cfg'\'', '\''getrandom_backend="wasm_js"'\'']' \
            > .cargo/config.toml

      - name: Install Rust and the WebAssembly target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: v0.21.14

      - name: Build the production site
        run: trunk build --release --locked --public-url "${{ steps.pages.outputs.base_path }}/"

      - name: Verify the production site
        run: |
          test -s dist/index.html
          test -n "$(find dist -maxdepth 1 -type f -name '*.wasm' -print -quit)"

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
