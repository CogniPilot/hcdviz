<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HCDViz (HCDF Viewer)</title>
    <!-- Tab favicon = the dendrite PCB-trace logo; trunk copies + content-hashes it into dist. -->
    <link data-trunk rel="icon" href="dendrite-logo.svg" />
    <!-- Trunk builds the default bin to wasm32 and generates the JS glue, fetching a wasm-bindgen
         that MATCHES the crate version (sidesteps the local CLI mismatch). wasm-opt "z" (binaryen)
         shrinks the shipped bundle several-fold; set data-wasm-opt="0" for fast dev iteration. -->
    <!-- data-initializer="loader.mjs" taps the wasm-bindgen init pipeline (trunk >= 0.19)
         so the boot overlay below shows real download/instantiate progress instead of a
         blank #1b1b1f page (indistinguishable from a build failure or init panic). Trunk
         copies loader.mjs into dist/ and wires its import automatically. -->
    <link data-trunk rel="rust" data-wasm-opt="z" data-initializer="loader.mjs" />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1b1b1f; }
      /* hcdviz sets no canvas selector, so Bevy appends its own <canvas>; size it to the viewport. */
      canvas { display: block; width: 100vw; height: 100vh; outline: none; }

      /* ---- Boot overlay (self-contained, no external assets) ------------------
         Sits above Bevy's canvas until loader.mjs (the trunk initializer) fades it
         out on TrunkApplicationStarted, or swaps it to an error card on failure. */
      #boot-overlay {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        background: #1b1b1f;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #c8c8d0;
        transition: opacity .4s ease;
      }
      #boot-overlay.boot-hide { opacity: 0; pointer-events: none; }
      .boot-box {
        display: flex; flex-direction: column; align-items: center;
        gap: 18px; padding: 32px 40px; max-width: 80vw;
        border: 1px solid #2c2c34; border-radius: 12px;
        background: #202027; box-shadow: 0 8px 40px rgba(0,0,0,.5);
      }
      /* The classic Dendrite boot widget: the PCB-trace logo breathing (opacity + gentle
         scale swell), exactly the pulse the original dendrite web loader used. */
      .boot-logo { width: 110px; height: 110px; animation: boot-pulse 2s ease-in-out infinite; }
      @keyframes boot-pulse {
        0%, 100% { opacity: .8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      .boot-name { font-size: 24px; font-weight: 700; letter-spacing: .3px; color: #4a9eff; }
      .boot-sub { font-size: 12.5px; color: #9a9aa6; margin-top: -12px; }
      .boot-spinner {
        width: 34px; height: 34px; border-radius: 50%;
        border: 3px solid #33333d; border-top-color: #4a9eff;
        animation: boot-spin .8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      #boot-track {
        position: relative; width: 260px; max-width: 60vw; height: 5px;
        border-radius: 3px; background: #33333d; overflow: hidden;
      }
      #boot-bar {
        position: absolute; left: 0; top: 0; height: 100%; width: 0%;
        border-radius: 3px; background: #4a9eff; transition: width .2s ease;
      }
      /* Indeterminate sweep for the instantiating/starting phase (or no content-length). */
      #boot-track.boot-indeterminate #boot-bar {
        width: 40% !important; animation: boot-sweep 1.1s ease-in-out infinite; transition: none;
      }
      @keyframes boot-sweep {
        0% { left: -40%; } 100% { left: 100%; }
      }
      #boot-status { font-size: 12.5px; color: #9a9aa6; min-height: 1.2em; text-align: center; }
      #boot-error {
        display: none; max-width: 70vw; max-height: 30vh; overflow: auto;
        font: 11.5px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #e79aa0; white-space: pre-wrap; word-break: break-word; text-align: left;
      }
      /* Error state: red accent, hide spinner + bar, reveal the message box. */
      #boot-overlay.boot-failed .boot-box { border-color: #6e2b2f; }
      #boot-overlay.boot-failed .boot-spinner { display: none; }
      #boot-overlay.boot-failed #boot-track { display: none; }
      #boot-overlay.boot-failed .boot-name { color: #e5484d; }
      #boot-overlay.boot-failed #boot-status { color: #e5484d; }
      #boot-overlay.boot-failed #boot-error { display: block; }
    </style>
  </head>
  <body>
    <div id="boot-overlay" role="status" aria-live="polite">
      <div class="boot-box">
        <!-- The original dendrite PCB-trace logo (8-way symmetric), inlined so it renders
             instantly before any fetch and the loader stays fully self-contained. -->
        <svg class="boot-logo" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

          <path d="M100 50 L115 35" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="81" y="31" width="8" height="8" fill="#00d4aa"/><rect x="112" y="32" width="6" height="6" fill="#00a888"/>
          <path d="M108 92 L135 65 L165 65" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

          <rect x="161" y="111" width="8" height="8" fill="#00d4aa"/><rect x="162" y="82" width="6" height="6" fill="#00a888"/>
          <path d="M108 108 L135 135 L165 135" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
          <path d="M135 135 L135 155" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="161" y="131" width="8" height="8" fill="#00d4aa"/><rect x="132" y="152" width="6" height="6" fill="#00a888"/>
          <path d="M100 112 L100 150 L115 165" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
          <path d="M100 150 L85 165" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="111" y="161" width="8" height="8" fill="#00d4aa"/><rect x="82" y="162" width="6" height="6" fill="#00a888"/>
          <path d="M92 108 L65 135 L35 135" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
          <path d="M65 135 L65 155" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="31" y="131" width="8" height="8" fill="#00d4aa"/><rect x="62" y="152" width="6" height="6" fill="#00a888"/>
          <path d="M88 100 L50 100 L35 85" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
          <path d="M50 100 L35 115" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="31" y="81" width="8" height="8" fill="#00d4aa"/><rect x="32" y="112" width="6" height="6" fill="#00a888"/>
          <path d="M92 92 L65 65 L35 65" stroke="#00d4aa" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
          <path d="M65 65 L65 45" stroke="#00d4aa" stroke-width="2" stroke-linecap="square" fill="none"/>
          <rect x="31" y="61" width="8" height="8" fill="#00d4aa"/><rect x="62" y="42" width="6" height="6" fill="#00a888"/>
          <rect x="88" y="88" width="24" height="24" fill="#00d4aa"/><circle cx="100" cy="100" r="6" fill="#006655"/>
        </svg>
        <div class="boot-name">HCDViz</div>
        <div class="boot-sub">HCDF Viewer</div>
        <div class="boot-spinner" aria-hidden="true"></div>
        <div id="boot-track"><div id="boot-bar"></div></div>
        <div id="boot-status">loading…</div>
        <div id="boot-error"></div>
      </div>
    </div>
  </body>
</html>
